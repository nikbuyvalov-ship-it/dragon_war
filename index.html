<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <title>ГОЛОСУЙТЕ ЗА ВОЙНОВ ДРАКОНА</title>
    <style>
        /* Базовые стили для фуллскрина */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Видео на задний план */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Начальный экран с кнопкой */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8); /* Затемнение фона */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: #e63946; /* Красный цвет в стиле драконов */
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent; /* Убирает синий блик при нажатии на мобилках */
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .hint {
            margin-top: 15px;
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="startExperience()">ВОЙНЫ ДРАКОНА ЛУЧШЕ ВСЕХ</button>
    </div>

    <!-- Контейнер с видео -->
    <div class="video-container">
        <video id="myVideo" loop playsinline>
            <source src="Vid.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <script>
        function startExperience() {
            const video = document.getElementById('myVideo');
            const overlay = document.getElementById('overlay');

            video.muted = false;
            video.play().catch(function(error) {
                console.log("Ошибка автоплея: ", error);
            });

            // Плавное исчезновение заставки
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 500);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <title>ГОЛОСУЙТЕ ЗА ВОЙНОВ ДРАКОНА</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: #e63946;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.6);
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" id="startBtn">ВОЙНЫ ДРАКОНА ЛУЧШЕ ВСЕХ</button>
    </div>

    <div class="video-container">
        <!-- Добавлены критические атрибуты для iOS: playsinline, webkit-playsinline, preload -->
        <video id="myVideo" loop playsinline webkit-playsinline preload="auto">
            <source src="Vid.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const overlay = document.getElementById('overlay');
        const btn = document.getElementById('startBtn');

        // Для iOS важно, чтобы запуск видео происходил строго внутри события 'click' или 'touchstart'
        btn.addEventListener('click', function() {
            startExperience();
        });

        function startExperience() {
            // Сначала включаем видео, потом убираем оверлей
            video.muted = false;
            
            // Включаем воспроизведение
            const promise = video.play();

            if (promise !== undefined) {
                promise.then(() => {
                    // Видео пошло — скрываем кнопку
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 500);
                }).catch(error => {
                    console.error("Ошибка запуска:", error);
                    // Если не пускает со звуком, пробуем без (на случай режима энергосбережения)
                    video.muted = true;
                    video.play();
                });
            }
        }
    </script>

</body>
</html>
